<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pulpa TV — Slideshow</title>

    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: var(--slide-bg-color, #000);
      }

      .stage {
        width: 100vw;
        height: 100vh;
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: #000;
      }

      .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 500ms ease;
      }

      .slide.is-active {
        opacity: 1;
      }

      .slide-bg,
      .slide-media {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .slide-bg {
        object-fit: cover;
        filter: blur(20px) brightness(0.45);
        transform: scale(1.08);
      }

      .slide-media {
        object-fit: contain;
        object-position: center;
      }

      .hint {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        color: rgba(255, 255, 255, 0.75);
        font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      }
    </style>
  </head>

  <body>
    <div class="stage" id="stage">
      <div class="slide is-active" id="slideA">
        <img class="slide-bg" alt="" aria-hidden="true" />
        <img class="slide-media" alt="Slideshow image A" />
      </div>
      <div class="slide" id="slideB">
        <img class="slide-bg" alt="" aria-hidden="true" />
        <img class="slide-media" alt="Slideshow image B" />
      </div>
      <div class="hint" id="hint"></div>
    </div>

    <script>
      // -----------------------------
      // CONFIG
      // -----------------------------
      const SLIDES_FALLBACK = [
        { src: '/assets/img/img.png', durationMs: 10000 },
        { src: '/assets/img/img3.png', durationMs: 10000 },
        { src: '/assets/img/img2.gif', durationMs: 6000 }
      ];

      const SLIDES = Array.isArray(window.SLIDES) && window.SLIDES.length
        ? window.SLIDES
        : SLIDES_FALLBACK;

      // -----------------------------
      // ASYNC PRELOAD
      // -----------------------------
      function getAverageImageColor(img) {
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d', { willReadFrequently: true });
        const sampleSize = 24;

        if (!context) {
          return '#000000';
        }

        canvas.width = sampleSize;
        canvas.height = sampleSize;
        context.drawImage(img, 0, 0, sampleSize, sampleSize);

        const { data } = context.getImageData(0, 0, sampleSize, sampleSize);
        let red = 0;
        let green = 0;
        let blue = 0;
        let count = 0;

        for (let index = 0; index < data.length; index += 4) {
          const alpha = data[index + 3];
          if (alpha < 16) {
            continue;
          }

          red += data[index];
          green += data[index + 1];
          blue += data[index + 2];
          count += 1;
        }

        if (!count) {
          return '#000000';
        }

        return `rgb(${Math.round(red / count)}, ${Math.round(green / count)}, ${Math.round(blue / count)})`;
      }

      function preloadSlidesSequential(slides) {
        const loaded = [];

        return slides.reduce((chain, slide) => {
          return chain.then(() => {
            return new Promise((resolve, reject) => {
              const img = new Image();
              img.decoding = 'sync';
              img.loading = 'eager';
              img.onload = () => {
                loaded.push({
                  ...slide,
                  backgroundColor: getAverageImageColor(img)
                });
                resolve();
              };
              img.onerror = () => reject(new Error('No se pudo cargar: ' + slide.src));
              img.src = slide.src;
            });
          });
        }, Promise.resolve()).then(() => loaded);
      }

      // -----------------------------
      // SLIDESHOW
      // -----------------------------
      function startSlideshow(slides) {
        const slideA = document.getElementById('slideA');
        const slideB = document.getElementById('slideB');
        const hint = document.getElementById('hint');
        const stage = document.getElementById('stage');

        function setSlideSource(slideEl, slide) {
          slideEl.querySelector('.slide-bg').src = slide.src;
          slideEl.querySelector('.slide-media').src = slide.src;
          stage.style.setProperty('--slide-bg-color', slide.backgroundColor || '#000000');
        }

        const normalized = slides
          .filter(s => s && typeof s.src === 'string' && s.src.trim().length)
          .map(s => ({
            src: s.src,
            durationMs: Number.isFinite(Number(s.durationMs)) && Number(s.durationMs) > 0
              ? Number(s.durationMs)
              : 5000
          }));

        if (!normalized.length) {
          hint.textContent = 'No hay slides válidos.';
          return;
        }

        let currentIndex = 0;
        let showingA = true;
        let timerId = null;

        setSlideSource(slideA, normalized[0]);
        slideA.classList.add('is-active');

        slideB.classList.remove('is-active');
        hint.textContent = '';

        function scheduleNext() {
          const wait = normalized[currentIndex].durationMs;

          timerId = window.setTimeout(() => {
            currentIndex = (currentIndex + 1) % normalized.length;
            const nextSlide = normalized[currentIndex];

            const incoming = showingA ? slideB : slideA;
            const outgoing = showingA ? slideA : slideB;

            setSlideSource(incoming, nextSlide);

            requestAnimationFrame(() => {
              incoming.classList.add('is-active');
              outgoing.classList.remove('is-active');

              showingA = !showingA;
              scheduleNext();
            });
          }, wait);
        }

        window.addEventListener('beforeunload', () => {
          if (timerId) window.clearTimeout(timerId);
        });

        scheduleNext();
      }

      // -----------------------------
      // BOOT
      // -----------------------------
      (async function boot() {
        const hint = document.getElementById('hint');

        if (!Array.isArray(SLIDES) || SLIDES.length === 0) {
          hint.textContent = 'Configura SLIDES para apuntar a tus imágenes.';
          return;
        }

        hint.textContent = 'Cargando imágenes…';

        try {
          const loadedSlides = await preloadSlidesSequential(SLIDES);
          startSlideshow(loadedSlides);
        } catch (err) {
          hint.textContent = String(err && err.message ? err.message : err);
          console.error(err);
        }
      })();
    </script>
  </body>
</html>
